name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: smartd

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install hatchling lazy_loader
          pip install datadog-checks-base datadog-checks-dev pytest
          pip install -e .

      - name: Run tests
        run: pytest tests/ -v
